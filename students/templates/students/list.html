<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
</head>
<body>
    
    <h1>Student List</h1>

<a href="/add/">Add Student</a>

<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Action</th>
</tr>

{% for student in students %}
<tr>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.course }}</td>
<td>
<a href="/delete/{{ student.id }}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
